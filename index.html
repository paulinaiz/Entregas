<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelería sin gluten</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poly:ital@0;1&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poly:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN -->
    <header>
        <nav class="caja-navegacion">
            
            <!-- Información de contacto y acciones -->
            <div class="contacto-acciones">
                
                <!-- <button type="button" class="lupa">
                    <img src="imagenes/lupa.png" alt="Buscar" />
                </button> -->

                <div class="buscador-wrapper">
                    <div class="buscador-contenedor">
                        <input type="text" id="input-busqueda" placeholder="Buscar producto..." class="input-oculto">
                        <button type="button" class="lupa" id="btn-lupa">
                            <img src="imagenes/lupa.png" alt="Buscar" />
                        </button>
                </div>
                    <button type="button" id="btn-limpiar-busqueda" class="limpiar-busqueda" style="display: none;">✕ Limpiar</button>
                </div>
                
                <button type="button" class="carrito">
                    <a href="/html/carrito.html"><img src="imagenes/carrito-de-compras.png" alt="Buscar" /> <span id="cuenta-carrito">0</span> </a>
                </button>
            </div>

        </nav>

    </header>

    <main>
            <!-- INICIO -->
        <section class="hero-section">
            <div class="titulo">
                <h1 id="hero-title">Postres sin Gluten</h1>
                <p>Delicias sin T.A.C.C. y llenas de sabor</p>
                <a href="#productos">Ver productos</a>
            </div>
        </section>

        <section class="seccion-productos" id="productos">
            
                <div class="grid-productos" id="contenedor-productos">

                
                </div>

        </section>

    </main>


    <!-- MODAL DEL CARRITO (centrado en la pantalla) -->
    <div id="modal-carrito" class="modal oculto">
        
        <!-- Contenido del carrito -->
        <div class="modal-contenido">
            <div class="carrito-header">
                <button id="cerrar-carrito" class="btn-cerrar">x</button>
            </div>
            
            <div class="carrito-tabla">
                <table>
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="carrito-items">
                        <!-- JavaScript llenará esto dinámicamente -->
                    </tbody>
                </table>
            </div>
            
            <div class="carrito-footer">
                <div class="resumen-linea">
                    <span>Subtotal</span>
                    <span id="carrito-subtotal">$0</span>
                </div>
                <div class="resumen-linea">
                    <span>Envío</span>
                    <span id="carrito-envio">$2.990</span>
                </div>
                <div class="resumen-linea">
                    <span>Descuento</span>
                    <span id="carrito-descuento">$0</span>
                </div>
                <div class="resumen-total">
                    <span>TOTAL</span>
                    <span id="carrito-total">$0</span>
                </div>
                <button id="finalizar-compra">Finalizar Compra</button>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="script1.js"></script>
    
</body>
</html>
